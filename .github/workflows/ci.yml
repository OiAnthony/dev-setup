name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint install.sh
        run: shellcheck install.sh

      - name: Lint dev-setup.zsh (advisory)
        run: shellcheck dotfiles/dev-setup.zsh || echo "Warning: zsh syntax may cause false positives"
        continue-on-error: true

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: dev-setup-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run integration test
        run: |
          docker run --rm dev-setup-test:latest /home/testuser/dev-setup/scripts/test-install.sh

      - name: Run Kaku path test
        run: |
          docker run --rm dev-setup-test:latest /home/testuser/dev-setup/scripts/test-install.sh --with-kaku

      - name: Run idempotent test
        run: |
          docker run --rm dev-setup-test:latest /home/testuser/dev-setup/scripts/test-idempotent.sh
